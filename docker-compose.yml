services:
  pi-tv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-tv
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
      - "${REMOTE_PORT:-3001}:${REMOTE_PORT:-3001}"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
